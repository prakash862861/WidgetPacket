<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:widget="http://www.netvibes.com/ns/">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<meta name="autoRefresh" content="0" />
<title>Project POC Landing Page</title>

<!-- Bootstrap CSS -->
<link rel="stylesheet" href="../JazzySole/bootstrap/css/bootstrap.min.css" />

<!-- UWA application preferences -->
<widget:preferences>    
  <widget:preference type="text" name="widgetTitle" label="Widget Title" default_value="Project POC Dashboard">
  </widget:preference>
</widget:preferences>

<script type="text/javascript" src="Project_POC.js"></script>
<script type="text/javascript">
    widget.addEvents({
        onLoad : function(event) {
            require(['UWA/Core','Project_POC/Project_POC'], function (UWA, Project_POC) {
                'use strict';
                Project_POC.onLoad();
            });
        },
        onRefresh : function(event) {
            require(['UWA/Core','Project_POC/Project_POC'], function (UWA, Project_POC) {
                'use strict';
                Project_POC.onRefresh();
            });
        }
    });
</script>
</head>
<body>
    <div class="container-fluid py-3 widget-container" id="project-poc-container">
        <!-- Content will be dynamically generated by JavaScript -->
    </div>
</body>
</html>
